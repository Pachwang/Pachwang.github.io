n> Node&lt;k,v&gt;[] table;<br>    <span class="hljs-comment">// 存放具体元素的集</span><br>    <span class="hljs-keyword">transient</span> Set&lt;map.entry&lt;k,v&gt;&gt; entrySet;<br>    <span class="hljs-comment">// 存放元素的个数，注意这个不等于数组的长度。</span><br>    <span class="hljs-keyword">transient</span> <span class="hljs-type">int</span> size;<br>    <span class="hljs-comment">// 每次扩容和更改map结构的计数器</span><br>    <span class="hljs-keyword">transient</span> <span class="hljs-type">int</span> modCount;<br>    <span class="hljs-comment">// 阈值(容量*负载因子) 当实际大小超过阈值时，会进行扩容</span><br>    <span class="hljs-type">int</span> threshold;<br>    <span class="hljs-comment">// 负载因子</span><br>    <span class="hljs-keyword">final</span> <span class="hljs-type">float</span> loadFactor;<br>&#125;<br></code></pre></td></tr></table></figure>

span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br></pre></td><td class="code"><pre><code class="hljs java"><span class="hljs-comment">/* </span><br><span class="hljs-comment">	Implements Map.put and related methods.</span><br><span class="hljs-comment">	Params:</span><br><span class="hljs-comment">    hash – hash for key</span><br><span class="hljs-comment">    key – the key</span><br><span class="hljs-comment">    value – the value to put</span><br><span class="hljs-comment">    onlyIfAbsent – if true, don&#x27;t change existing value</span><br><span class="hljs-comment">    evict – if false, the table is in creation mode.</span><br><span class="hljs-comment">    Returns:</span><br><span class="hljs-comment">    previous value, or null if none </span><br><span class="hljs-comment">*/</span><br><br><span class="hljs-comment">// 接收哈希值 hash、键 key、值 value、是否仅键不存在时插入 onlyIfAbsent 和是否执行淘汰操作 evict</span><br><span class="hljs-keyword">final</span> V <span class="hljs-title function_">putVal</span><span class="hljs-params">(<span class="hljs-type">int</span> hash, K key, V value, <span class="hljs-type">boolean</span> onlyIfAbsent,</span><br><span class="hljs-params">                   <span class="hljs-type">boolean</span> evict)</span> &#123;<br>    <br>    	<span class="hljs-comment">// 声明哈希表数组, 即桶</span><br>        Node&lt;K,V&gt;[] tab;<br>    <br>    	<span class="hljs-comment">// 当前节点p</span><br>    	Node&lt;K,V&gt; p; <br>    <br>    	<span class="hljs-comment">// 哈希表长度、结点索引</span><br>    	<span class="hljs-type">int</span> n, i;<br>    <br>    	<span class="hljs-comment">// 检查哈希表是否为空或者长度为0，如果为空或者长度为0则进行扩容</span><br>        <span class="hljs-keyword">if</span> ((tab = table) == <span class="hljs-literal">null</span> || (n = tab.length) == <span class="hljs-number">0</span>)<br>          	<span class="hljs-comment">// 长度赋值为扩容后的长度</span><br>            n = (tab = resize()).length;<br>    <br>    	<span class="hljs-comment">// 计算当前结点应该存放在哪个桶中，p表示桶中的Node，并进行判断 </span><br>        <span class="hljs-keyword">if</span> ((p = tab[i = (n - <span class="hljs-number">1</span>) &amp; hash]) == <span class="hljs-literal">null</span>)<br>            <span class="hljs-comment">// 如果是空，新生成结点放入桶中</span><br>            tab[i] = newNode(hash, key, value, <span class="hljs-literal">null</span>);<br>    <br>    	<span class="hljs-comment">// 如果桶中已经存在元素，那么需要处理hash冲突</span><br>        <span class="hljs-keyword">else</span> &#123;<br>            <span class="hljs-comment">// 用于存储已存在的结点</span><br>            Node&lt;K,V&gt; e; <br>            <span class="hljs-comment">// p节点的键，此时p表示桶中的结点</span><br>            K k;<br>            <span class="hljs-comment">// 如果桶中节点table[i]的键等于当前结点的键</span><br>            <span class="hljs-keyword">if</span> (p.hash == hash &amp;&amp; ((k = p.key) == key || (key != <span class="hljs-literal">null</span> &amp;&amp; key.equals(k))))<br>                <span class="hljs-comment">// 键相同，那么就先让e表示桶中的结点，后面再进行判断是否覆盖</span><br>                e = p;<br>            <span class="hljs-comment">// 如果当前结点是红黑树结点，则调用红黑树的插入方法</span><br>            <span class="hljs-keyword">else</span> <span class="hljs-keyword">if</span> (p <span class="hljs-keyword">instanceof</span> TreeNode)<br>                e = ((TreeNode&lt;K,V&gt;)p).putTreeVal(<span class="hljs-built_in">this</span>, tab, hash, key, value);<br>            <span class="hljs-comment">// 不是红黑树结点则说明为链表结点</span><br>            <span class="hljs-keyword">else</span> &#123;<br>                <span class="hljs-comment">// 遍历链表查找相同的键</span><br>                <span class="hljs-keyword">for</span> (<span class="hljs-type">int</span> <span class="hljs-variable">binCount</span> <span class="hljs-operator">=</span> <span class="hljs-number">0</span>; ; ++binCount) &#123;<br>                    <span class="hljs-comment">// 找到链表末尾，创建新结点并插入链表尾部</span><br>                    <span class="hljs-keyword">if</span> ((e = p.next) == <span class="hljs-literal">null</span>) &#123;<br>                        p.next = newNode(hash, key, value, <span class="hljs-literal">null</span>);<br>                        <span class="hljs-comment">// 判断此时链表长度是否达到阈值，如果达到阈值则将链表转换为红黑树</span><br>                        <span class="hljs-keyword">if</span> (binCount &gt;= TREEIFY_THRESHOLD - <span class="hljs-number">1</span>) <span class="hljs-comment">// -1 for 1st</span><br>                            treeifyBin(tab, hash);<br>                        <span class="hljs-comment">// 结束for循环</span><br>                        <span class="hljs-keyword">break</span>;<br>                    &#125;<br>                    <span class="hljs-comment">// 如果找到相同的键，则跳出循环</span><br>                    <span class="hljs-keyword">if</span> (e.hash == hash &amp;&amp; ((k = e.key) == key || (key != <span class="hljs-literal">null</span> &amp;&amp; key.equals(k))))<br>                        <span class="hljs-keyword">break</span>;<br>                    <span class="hljs-comment">// 继续遍历下一个结点，与前面
